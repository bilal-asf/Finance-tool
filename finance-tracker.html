<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Personal Finance Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg: #EEF1EF;
    --surface: #FFFFFF;
    --surface-2: #F6F7F5;
    --ink: #1F2A24;
    --muted: #6E776F;
    --faint: #9AA39B;
    --line: #DDE2DD;
    --income: #3F7A5E;
    --income-soft: #E4EFE8;
    --expense: #B5654A;
    --expense-soft: #F5E7E1;
    --ring: rgba(63,122,94,0.25);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 2px rgba(31,42,36,0.04), 0 4px 16px rgba(31,42,36,0.05);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .tabular{ font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

  button{ font-family: inherit; cursor: pointer; }
  input, select{ font-family: inherit; }

  /* ---------- Layout shell ---------- */
  #app{ max-width: 880px; margin: 0 auto; padding: 0 20px 64px; }

  .header{
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(238,241,239,0.92);
    backdrop-filter: blur(8px);
    padding: 22px 0 16px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
  }
  .header-row{
    display:flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .brand{
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 6px;
  }
  .balance-label{
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 2px;
  }
  .balance-value{
    font-family: 'Fraunces', serif;
    font-size: 42px;
    font-weight: 500;
    line-height: 1.05;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .balance-value.negative{ color: var(--expense); }
  .balance-value.positive{ color: var(--ink); }
  .tide-line{
    margin-top: 10px;
    height: 4px;
    width: 220px;
    max-width: 60vw;
    background: var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .tide-fill{
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .add-btn{
    flex-shrink: 0;
    display:flex;
    align-items:center;
    gap: 8px;
    background: var(--ink);
    color: var(--surface);
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px 18px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: var(--shadow);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .add-btn:hover{ background: #14201A; transform: translateY(-1px); }
  .add-btn svg{ width:16px; height:16px; }

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex;
    gap: 4px;
    background: var(--surface-2);
    padding: 4px;
    border-radius: var(--radius-sm);
    width: fit-content;
    margin-bottom: 18px;
  }
  .tab{
    border:none;
    background: transparent;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    border-radius: 7px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .tab.active{
    background: var(--surface);
    color: var(--ink);
    box-shadow: var(--shadow);
  }

  .period-nav{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 22px;
  }
  .nav-btn{
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--surface);
    display:flex; align-items:center; justify-content:center;
    color: var(--ink);
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .nav-btn:hover{ border-color: var(--income); background: var(--income-soft); }
  .nav-btn svg{ width:14px; height:14px; }
  .period-label{
    font-size: 15px;
    font-weight: 600;
    min-width: 200px;
    text-align: center;
  }
  .today-btn{
    border:none; background:none;
    font-size: 12.5px;
    color: var(--income);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
    padding: 4px 6px;
  }

  /* ---------- Summary cards ---------- */
  .summary-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .summary-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .summary-label{
    font-size: 12.5px;
    color: var(--muted);
    margin: 0 0 8px;
    display:flex; align-items:center; gap:6px;
  }
  .summary-dot{ width:7px; height:7px; border-radius:50%; }
  .summary-value{
    font-size: 22px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .summary-value.income{ color: var(--income); }
  .summary-value.expense{ color: var(--expense); }

  /* ---------- Section shell ---------- */
  .section{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 20px 8px;
    margin-bottom: 20px;
  }
  .section + .section{ margin-top: 0; }
  .section-title{
    font-size: 13.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin: 0 0 16px;
  }

  /* ---------- Bar chart ---------- */
  .bar-row{
    display:grid;
    grid-template-columns: 120px 1fr 86px;
    align-items:center;
    gap: 12px;
    padding-bottom: 14px;
  }
  .bar-label{
    display:flex; align-items:center; gap:8px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    overflow:hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .bar-track{
    height: 10px;
    background: var(--surface-2);
    border-radius: 6px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius: 6px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .bar-amount{
    font-size: 13.5px;
    font-weight: 600;
    text-align: right;
    color: var(--muted);
  }

  /* ---------- Entries list ---------- */
  .entry-row{
    display:grid;
    grid-template-columns: 64px 110px 1fr 100px 64px;
    align-items:center;
    gap: 12px;
    padding: 13px 0;
    border-top: 1px solid var(--line);
  }
  .entry-row:first-of-type{ border-top: none; }
  .entry-date{ font-size: 12.5px; color: var(--muted); }
  .entry-cat{
    display:flex; align-items:center; gap:7px;
    font-size: 13px; font-weight: 600;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .entry-note{
    font-size: 13.5px;
    color: var(--muted);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .entry-amount{ font-size: 14px; font-weight: 700; text-align:right; }
  .entry-amount.income{ color: var(--income); }
  .entry-amount.expense{ color: var(--expense); }
  .entry-actions{ display:flex; gap:4px; justify-content:flex-end; }
  .icon-btn{
    width: 28px; height: 28px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--faint);
    display:flex; align-items:center; justify-content:center;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .icon-btn:hover{ background: var(--surface-2); color: var(--ink); }
  .icon-btn svg{ width:15px; height:15px; }

  .empty-state{
    padding: 28px 4px 32px;
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    line-height: 1.6;
  }
  .empty-state strong{ display:block; color: var(--ink); font-size: 14.5px; margin-bottom: 4px; font-weight:600;}

  /* ---------- Modal ---------- */
  .overlay{
    position: fixed; inset: 0;
    background: rgba(31,42,36,0.38);
    backdrop-filter: blur(2px);
    display:flex; align-items:center; justify-content:center;
    padding: 20px;
    z-index: 50;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .modal-card{
    background: var(--surface);
    border-radius: var(--radius);
    width: 100%;
    max-width: 420px;
    padding: 24px 24px 20px;
    box-shadow: 0 20px 60px rgba(31,42,36,0.25);
    animation: riseIn 0.18s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes riseIn{ from{opacity:0; transform: translateY(8px);} to{opacity:1; transform: translateY(0);} }
  .modal-title{
    font-family:'Fraunces', serif;
    font-size: 21px;
    font-weight: 500;
    margin: 0 0 18px;
  }
  .type-toggle{
    display:flex; gap:8px;
    background: var(--surface-2);
    padding: 4px;
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
  }
  .pill{
    flex:1;
    border:none;
    background: transparent;
    padding: 9px 0;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--muted);
    border-radius: 7px;
    transition: all 0.15s ease;
  }
  .pill.active[data-type="income"]{ background: var(--income-soft); color: var(--income); }
  .pill.active[data-type="expense"]{ background: var(--expense-soft); color: var(--expense); }

  .field{ margin-bottom: 14px; }
  .field label{
    display:block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field select{
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    font-size: 14.5px;
    color: var(--ink);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .field input:focus, .field select:focus{
    border-color: var(--income);
    box-shadow: 0 0 0 3px var(--ring);
  }
  .row-2{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-error{
    font-size: 12.5px;
    color: var(--expense);
    margin: -6px 0 14px;
    display:none;
  }
  .form-error.show{ display:block; }
  .modal-actions{
    display:flex; justify-content:flex-end; gap:10px; margin-top: 6px;
  }
  .btn-secondary{
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-weight: 600;
  }
  .btn-secondary:hover{ background: var(--surface-2); }
  .btn-primary{
    border:none;
    background: var(--ink);
    color: var(--surface);
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-weight: 600;
  }
  .btn-primary:hover{ background: #14201A; }

  /* ---------- Responsive ---------- */
  @media (max-width: 600px){
    .summary-grid{ grid-template-columns: 1fr; }
    .entry-row{
      grid-template-columns: 1fr auto;
      grid-template-areas:
        "cat amount"
        "note note"
        "date actions";
      row-gap: 4px;
    }
    .entry-cat{ grid-area: cat; }
    .entry-amount{ grid-area: amount; }
    .entry-note{ grid-area: note; white-space: normal; }
    .entry-date{ grid-area: date; }
    .entry-actions{ grid-area: actions; }
    .bar-row{ grid-template-columns: 92px 1fr 70px; }
    .balance-value{ font-size: 34px; }
    .header-row{ flex-wrap: wrap; }
  }

  :focus-visible{ outline: 2px solid var(--income); outline-offset: 2px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  /* ============ Constants ============ */
  var EXPENSE_CATS = ['Food','Transport','Housing','Utilities','Entertainment','Health','Shopping','Other'];
  var INCOME_CATS = ['Salary','Freelance','Gift','Investment','Other'];
  var CAT_COLORS = {
    Food:'#B5654A', Transport:'#2F5D8A', Housing:'#3F7A5E', Utilities:'#9C7A3C',
    Entertainment:'#7A5C7E', Health:'#5C6B73', Shopping:'#A85B6B',
    Salary:'#3F7A5E', Freelance:'#2F5D8A', Gift:'#9C7A3C', Investment:'#5C6B73',
    Other:'#8A8F87'
  };
  var ICON_PENCIL = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 3.5l3 3L7 16l-4 1 1-4 9.5-9.5z"/></svg>';
  var ICON_TRASH = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h12M8 6V4.5A1.5 1.5 0 019.5 3h1A1.5 1.5 0 0112 4.5V6m-6.5 0l.6 9.4A1.5 1.5 0 007.6 17h4.8a1.5 1.5 0 001.5-1.6L14.5 6"/></svg>';
  var ICON_PLUS = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 2.5v11M2.5 8h11"/></svg>';
  var ICON_CHEV_L = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg>';
  var ICON_CHEV_R = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5"/></svg>';

  /* ============ Date helpers ============ */
  function startOfDay(d){ var x = new Date(d); x.setHours(0,0,0,0); return x; }
  function parseISO(s){ return startOfDay(new Date(s + 'T00:00:00')); }
  function toISO(d){
    var y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return y + '-' + m + '-' + day;
  }
  function daysAgoISO(n){ var d = startOfDay(new Date()); d.setDate(d.getDate()-n); return toISO(d); }
  function startOfWeek(d){ var x = startOfDay(d); var day = (x.getDay()+6)%7; x.setDate(x.getDate()-day); return x; }
  function endOfWeek(d){ var s = startOfWeek(d); var e = new Date(s); e.setDate(s.getDate()+6); return e; }

  function fmt(n){
    var sign = n < 0 ? '-' : '';
    return sign + '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  }
  function shortDate(iso){
    return parseISO(iso).toLocaleDateString('en-US', {month:'short', day:'numeric'});
  }
  function genId(){ return 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  /* ============ Seed data ============ */
  var entries = [
    {id:genId(), date: daysAgoISO(0),  type:'expense', amount:14.20,  category:'Food',          note:'Lunch'},
    {id:genId(), date: daysAgoISO(0),  type:'expense', amount:6.00,   category:'Entertainment',  note:'Streaming subscription'},
    {id:genId(), date: daysAgoISO(1),  type:'expense', amount:18.30,  category:'Transport',      note:'Taxi home'},
    {id:genId(), date: daysAgoISO(2),  type:'expense', amount:22.00,  category:'Shopping',       note:'Notebook and pens'},
    {id:genId(), date: daysAgoISO(3),  type:'expense', amount:9.50,   category:'Food',           note:'Coffee with a friend'},
    {id:genId(), date: daysAgoISO(4),  type:'income',  amount:250.00, category:'Freelance',      note:'Logo design'},
    {id:genId(), date: daysAgoISO(5),  type:'expense', amount:28.75,  category:'Food',           note:'Groceries'},
    {id:genId(), date: daysAgoISO(8),  type:'expense', amount:60.00,  category:'Entertainment',  note:'Concert tickets'},
    {id:genId(), date: daysAgoISO(11), type:'expense', amount:15.00,  category:'Transport',      note:'Metro pass top-up'},
    {id:genId(), date: daysAgoISO(14), type:'expense', amount:42.10,  category:'Food',           note:'Groceries'},
    {id:genId(), date: daysAgoISO(16), type:'expense', amount:85.40,  category:'Utilities',      note:'Electricity and water'},
    {id:genId(), date: daysAgoISO(17), type:'expense', amount:1200.00,category:'Housing',        note:'Rent'},
    {id:genId(), date: daysAgoISO(19), type:'income',  amount:3200.00,category:'Salary',         note:'Monthly paycheck'},
    {id:genId(), date: daysAgoISO(29), type:'income',  amount:3200.00,category:'Salary',         note:'Monthly paycheck'},
    {id:genId(), date: daysAgoISO(33), type:'expense', amount:95.00,  category:'Health',         note:'Dentist copay'}
  ];

  /* ============ State ============ */
  var state = {
    view: 'daily',
    cursor: startOfDay(new Date()),
    modal: { open:false, editId:null }
  };

  /* ============ Period logic ============ */
  function periodBounds(){
    if(state.view === 'daily'){
      var s = startOfDay(state.cursor);
      return { start:s, end:s };
    }
    if(state.view === 'weekly'){
      return { start: startOfWeek(state.cursor), end: endOfWeek(state.cursor) };
    }
    var s2 = new Date(state.cursor.getFullYear(), state.cursor.getMonth(), 1);
    var e2 = new Date(state.cursor.getFullYear(), state.cursor.getMonth()+1, 0);
    return { start: s2, end: e2 };
  }

  function periodLabel(){
    if(state.view === 'daily'){
      return state.cursor.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
    }
    if(state.view === 'weekly'){
      var s = startOfWeek(state.cursor), e = endOfWeek(state.cursor);
      var sameYear = s.getFullYear() === e.getFullYear();
      var left = s.toLocaleDateString('en-US', {month:'short', day:'numeric'});
      var right = e.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
      return left + ' – ' + right;
    }
    return state.cursor.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  }

  function entriesInPeriod(){
    var b = periodBounds();
    return entries.filter(function(en){
      var d = parseISO(en.date);
      return d >= b.start && d <= b.end;
    }).sort(function(a,b2){ return parseISO(b2.date) - parseISO(a.date); });
  }

  function navigate(dir){
    var c = new Date(state.cursor);
    if(state.view === 'daily'){ c.setDate(c.getDate() + dir); }
    else if(state.view === 'weekly'){ c.setDate(c.getDate() + 7*dir); }
    else { c = new Date(c.getFullYear(), c.getMonth() + dir, 1); }
    state.cursor = startOfDay(c);
  }

  function periodNoun(){
    return state.view === 'daily' ? 'day' : (state.view === 'weekly' ? 'week' : 'month');
  }

  /* ============ Rendering ============ */
  function render(){
    var all = entries;
    var totalBalance = all.reduce(function(sum, en){ return sum + (en.type === 'income' ? en.amount : -en.amount); }, 0);
    var periodEntries = entriesInPeriod();
    var totalIn = periodEntries.filter(function(e){return e.type==='income';}).reduce(function(s,e){return s+e.amount;},0);
    var totalOut = periodEntries.filter(function(e){return e.type==='expense';}).reduce(function(s,e){return s+e.amount;},0);
    var net = totalIn - totalOut;

    var catMap = {};
    periodEntries.filter(function(e){return e.type==='expense';}).forEach(function(e){
      catMap[e.category] = (catMap[e.category]||0) + e.amount;
    });
    var catList = Object.keys(catMap).map(function(k){ return {category:k, amount:catMap[k]}; })
      .sort(function(a,b){ return b.amount - a.amount; });
    var maxCat = catList.length ? catList[0].amount : 0;

    var html = '';

    /* Header */
    html += '<div class="header"><div class="header-row">';
    html += '<div><p class="brand">Ledger</p>';
    html += '<p class="balance-label">Running balance</p>';
    html += '<p class="balance-value tabular ' + (totalBalance < 0 ? 'negative' : 'positive') + '">' + fmt(totalBalance) + '</p>';
    var tidePct = Math.min(100, Math.max(6, (Math.abs(totalBalance) / (Math.max(Math.abs(totalBalance), 1000))) * 100));
    html += '<div class="tide-line"><div class="tide-fill" style="width:' + tidePct + '%; background:' + (totalBalance < 0 ? 'var(--expense)' : 'var(--income)') + ';"></div></div>';
    html += '</div>';
    html += '<button class="add-btn" data-action="open-add">' + ICON_PLUS + 'Add entry</button>';
    html += '</div></div>';

    /* Tabs */
    html += '<div class="tabs">';
    ['daily','weekly','monthly'].forEach(function(v){
      var label = v.charAt(0).toUpperCase() + v.slice(1);
      html += '<button class="tab ' + (state.view===v?'active':'') + '" data-action="set-view" data-view="' + v + '">' + label + '</button>';
    });
    html += '</div>';

    /* Period nav */
    html += '<div class="period-nav">';
    html += '<button class="nav-btn" data-action="nav-prev" aria-label="Previous">' + ICON_CHEV_L + '</button>';
    html += '<span class="period-label">' + periodLabel() + '</span>';
    html += '<button class="nav-btn" data-action="nav-next" aria-label="Next">' + ICON_CHEV_R + '</button>';
    html += '<button class="today-btn" data-action="today">Today</button>';
    html += '</div>';

    /* Summary cards */
    html += '<div class="summary-grid">';
    html += '<div class="summary-card"><p class="summary-label"><span class="summary-dot" style="background:var(--income)"></span>Money in</p><p class="summary-value income tabular">' + fmt(totalIn) + '</p></div>';
    html += '<div class="summary-card"><p class="summary-label"><span class="summary-dot" style="background:var(--expense)"></span>Money out</p><p class="summary-value expense tabular">' + fmt(totalOut) + '</p></div>';
    html += '<div class="summary-card"><p class="summary-label"><span class="summary-dot" style="background:var(--ink)"></span>Net</p><p class="summary-value tabular" style="color:' + (net<0?'var(--expense)':'var(--ink)') + '">' + fmt(net) + '</p></div>';
    html += '</div>';

    /* Category chart */
    html += '<div class="section"><p class="section-title">Spending by category</p>';
    if(catList.length === 0){
      html += '<div class="empty-state"><strong>No expenses this ' + periodNoun() + '</strong>Spending by category will appear here once you log an expense.</div>';
    } else {
      catList.forEach(function(c){
        var color = CAT_COLORS[c.category] || '#8A8F87';
        var pct = maxCat ? (c.amount / maxCat * 100) : 0;
        html += '<div class="bar-row">';
        html += '<div class="bar-label"><span class="dot" style="background:' + color + '"></span>' + c.category + '</div>';
        html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%; background:' + color + '"></div></div>';
        html += '<div class="bar-amount tabular">' + fmt(c.amount) + '</div>';
        html += '</div>';
      });
    }
    html += '</div>';

    /* Entries list */
    html += '<div class="section"><p class="section-title">Entries</p>';
    if(periodEntries.length === 0){
      html += '<div class="empty-state"><strong>Nothing logged for this ' + periodNoun() + '</strong>Tap “Add entry” to record income or an expense.</div>';
    } else {
      periodEntries.forEach(function(en){
        var color = CAT_COLORS[en.category] || '#8A8F87';
        html += '<div class="entry-row">';
        html += '<div class="entry-date">' + shortDate(en.date) + '</div>';
        html += '<div class="entry-cat"><span class="dot" style="background:' + color + '"></span>' + en.category + '</div>';
        html += '<div class="entry-note">' + (en.note ? escapeHTML(en.note) : '—') + '</div>';
        html += '<div class="entry-amount tabular ' + en.type + '">' + (en.type==='income'?'+':'−') + fmt(en.amount) + '</div>';
        html += '<div class="entry-actions">';
        html += '<button class="icon-btn" data-action="open-edit" data-id="' + en.id + '" aria-label="Edit entry" title="Edit">' + ICON_PENCIL + '</button>';
        html += '<button class="icon-btn" data-action="delete-entry" data-id="' + en.id + '" aria-label="Delete entry" title="Delete">' + ICON_TRASH + '</button>';
        html += '</div></div>';
      });
    }
    html += '</div>';

    /* Modal */
    if(state.modal.open){
      html += buildModalHTML(state.modal.editId);
    }

    document.getElementById('app').innerHTML = html;

    if(state.modal.open){
      var firstField = document.getElementById('field-amount');
      if(firstField){ setTimeout(function(){ firstField.focus(); }, 10); }
    }
  }

  function escapeHTML(s){
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function buildModalHTML(editId){
    var entry = editId ? entries.find(function(e){return e.id===editId;}) : null;
    var type = entry ? entry.type : 'expense';
    var cats = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
    var title = entry ? 'Edit entry' : 'Add entry';

    var h = '<div class="overlay" data-action="overlay-close">';
    h += '<div class="modal-card" data-action="noop">';
    h += '<p class="modal-title">' + title + '</p>';
    h += '<form id="entry-form" novalidate>';
    if(entry) h += '<input type="hidden" name="id" value="' + entry.id + '">';
    h += '<input type="hidden" name="type" id="entry-type" value="' + type + '">';

    h += '<div class="type-toggle">';
    h += '<button type="button" class="pill ' + (type==='expense'?'active':'') + '" data-action="select-type" data-type="expense">Expense</button>';
    h += '<button type="button" class="pill ' + (type==='income'?'active':'') + '" data-action="select-type" data-type="income">Income</button>';
    h += '</div>';

    h += '<div class="row-2">';
    h += '<div class="field"><label for="field-amount">Amount</label><input id="field-amount" type="number" step="0.01" min="0.01" name="amount" placeholder="0.00" value="' + (entry ? entry.amount : '') + '"></div>';
    h += '<div class="field"><label for="field-date">Date</label><input id="field-date" type="date" name="date" value="' + (entry ? entry.date : toISO(new Date())) + '"></div>';
    h += '</div>';

    h += '<div class="field"><label for="entry-category">Category</label><select id="entry-category" name="category">';
    cats.forEach(function(c){
      h += '<option value="' + c + '" ' + (entry && entry.category===c ? 'selected' : '') + '>' + c + '</option>';
    });
    h += '</select></div>';

    h += '<div class="field"><label for="field-note">Note</label><input id="field-note" type="text" name="note" placeholder="What was this for?" value="' + (entry ? escapeHTML(entry.note) : '') + '"></div>';

    h += '<p class="form-error" id="form-error">Please add a valid amount, date, and category.</p>';

    h += '<div class="modal-actions">';
    h += '<button type="button" class="btn-secondary" data-action="close-modal">Cancel</button>';
    h += '<button type="submit" class="btn-primary">' + (entry ? 'Save changes' : 'Add entry') + '</button>';
    h += '</div>';

    h += '</form></div></div>';
    return h;
  }

  function updateModalType(newType){
    var hidden = document.getElementById('entry-type');
    if(!hidden) return;
    hidden.value = newType;
    document.querySelectorAll('.pill').forEach(function(p){
      p.classList.toggle('active', p.dataset.type === newType);
    });
    var select = document.getElementById('entry-category');
    var current = select.value;
    var cats = newType === 'income' ? INCOME_CATS : EXPENSE_CATS;
    var keep = cats.indexOf(current) !== -1 ? current : cats[0];
    select.innerHTML = cats.map(function(c){
      return '<option value="' + c + '" ' + (c===keep?'selected':'') + '>' + c + '</option>';
    }).join('');
  }

  /* ============ Event delegation ============ */
  document.getElementById('app').addEventListener('click', function(e){
    var el = e.target.closest('[data-action]');
    if(!el) return;
    var action = el.dataset.action;

    if(action === 'noop') return;

    if(action === 'set-view'){ state.view = el.dataset.view; render(); }
    else if(action === 'nav-prev'){ navigate(-1); render(); }
    else if(action === 'nav-next'){ navigate(1); render(); }
    else if(action === 'today'){ state.cursor = startOfDay(new Date()); render(); }
    else if(action === 'open-add'){ state.modal = {open:true, editId:null}; render(); }
    else if(action === 'open-edit'){ state.modal = {open:true, editId:el.dataset.id}; render(); }
    else if(action === 'close-modal'){ state.modal = {open:false, editId:null}; render(); }
    else if(action === 'overlay-close'){ if(e.target === el){ state.modal = {open:false, editId:null}; render(); } }
    else if(action === 'select-type'){ updateModalType(el.dataset.type); }
    else if(action === 'delete-entry'){
      if(confirm('Delete this entry? This can’t be undone.')){
        entries = entries.filter(function(en){ return en.id !== el.dataset.id; });
        render();
      }
    }
  });

  document.getElementById('app').addEventListener('submit', function(e){
    if(e.target.id !== 'entry-form') return;
    e.preventDefault();
    var fd = new FormData(e.target);
    var id = fd.get('id');
    var type = fd.get('type');
    var amount = parseFloat(fd.get('amount'));
    var date = fd.get('date');
    var category = fd.get('category');
    var note = (fd.get('note') || '').trim();

    if(!amount || amount <= 0 || !date || !category){
      var err = document.getElementById('form-error');
      if(err) err.classList.add('show');
      return;
    }

    if(id){
      var idx = entries.findIndex(function(en){ return en.id === id; });
      if(idx !== -1){ entries[idx] = {id:id, type:type, amount:amount, date:date, category:category, note:note}; }
    } else {
      entries.push({id:genId(), type:type, amount:amount, date:date, category:category, note:note});
    }
    state.modal = {open:false, editId:null};
    render();
  });

  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && state.modal.open){
      state.modal = {open:false, editId:null};
      render();
    }
  });

  render();
})();
</script>
</body>
</html>
